name: iOS build

# macOS CI for the Capacitor iOS shell. This complements the Linux `CI` workflow
# (lint + harnesses + web build) by proving the native iOS App target still
# compiles after a web or native change. It builds the **App** target for the
# iOS Simulator with signing disabled — no Apple developer account or secrets
# needed. The `FidelisWidgetExtension` Widget Extension target is generated by
# `scripts/add-ios-widget-target.rb` and is committed in the pbxproj; the App target
# depends on and embeds it, so building the App scheme compiles the widgets too.
#
# Runs only when iOS-relevant files change (or on demand) to keep macOS minutes low.

on:
  workflow_dispatch:
  push:
    paths:
      - "ios/**"
      - "src/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - "src/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios.yml"

jobs:
  ios-build:
    # Capacitor 8.4.x ships its iOS framework as a binary xcframework built with
    # Apple Swift 6.2; an older toolchain cannot read its .swiftinterface (it fails
    # with misleading "no member" errors). Use the newest runner image and select
    # the newest installed Xcode so the Swift version is >= the framework's.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest/Contents/Developer"; fi
          xcodebuild -version
          swift --version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Build the web bundle and copy it + the Capacitor plugins into the Xcode
      # project (writes ios/App/App/public, which is gitignored and regenerated).
      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios

      # Surface the available schemes in the log (xcodebuild auto-creates the
      # "App" scheme when none is shared), then resolve the local Swift package.
      - name: List schemes
        run: xcodebuild -list -project ios/App/App.xcodeproj
      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ios/App/App.xcodeproj -scheme App

      # Build the App target for a generic simulator, signing disabled.
      - name: Build App (iOS Simulator, unsigned)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
