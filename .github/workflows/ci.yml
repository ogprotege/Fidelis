name: CI

# Review item §B.3: run the harnesses and the build on every push and pull
# request so a feast that silently moves, or a type error, is caught before it
# ever reaches a release. One job; the only cache is setup-node's built-in npm cache.

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
