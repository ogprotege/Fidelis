name: CI

# Review item §B.3: run the linter, the harnesses, and the build on every push
# and pull request so a feast that silently moves, a lint error, or a type error
# is caught before it ever reaches a release. One job; the only cache is
# setup-node's built-in npm cache. (`npm test` also runs `eslint src`, so the
# same command gates locally and remotely; the dedicated lint step fails fast.)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
